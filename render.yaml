services:
  - type: web
    name: hotel-guest-sentiment-api
    env: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: CORS_ORIGINS
        value: https://hotel-guest-sentiment-dashboard.vercel.app
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: DATABASE_URL
        fromDatabase:
          name: hotel-guest-sentiment-db
          property: connectionString

databases:
  - name: hotel-guest-sentiment-db
    plan: free